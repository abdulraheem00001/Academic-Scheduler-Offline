workflows:
  ios-build:
    name: iOS Build (Unsigned Release)
    max_build_duration: 60
    instance_type: mac_mini_m2
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Expo Prebuild
        script: npx expo prebuild --platform ios
      - name: Patch Podfile for modular headers
        script: |
          set -euo pipefail
          PODFILE=ios/Podfile
          if [[ ! -f "$PODFILE" ]]; then
            echo "Podfile missing; was expo prebuild skipped?"
            exit 1
          fi
          if ! grep -q "use_modular_headers!" "$PODFILE"; then
            perl -0777 -i -pe 's/^platform :ios,.*$/use_modular_headers!\\n$&/m' "$PODFILE"
            echo "Inserted use_modular_headers! to allow Swift pods with module maps."
          else
            echo "Podfile already opts into modular headers."
          fi
      - name: Install pods
        script: |
          cd ios
          pod install --repo-update
      - name: Bundle and Force Inject
        script: |
          set -euo pipefail

          # 1. Generate JavaScript bundle for iOS release
          npx expo export:embed \
            --platform ios \
            --dev false \
            --entry-file node_modules/expo-router/entry.js \
            --bundle-output ios/main.jsbundle \
            --assets-dest ios

          # Detect workspace and scheme
          WORKSPACE=$(find ios -maxdepth 1 -name "*.xcworkspace" | head -n 1)
          if [[ -z "$WORKSPACE" ]]; then
            echo "No .xcworkspace found after prebuild; attempting pod install"
            (cd ios && pod install)
            WORKSPACE=$(find ios -maxdepth 1 -name "*.xcworkspace" | head -n 1)
          fi
          if [[ -z "$WORKSPACE" ]]; then
            echo "ERROR: No .xcworkspace found; cannot continue."
            exit 1
          fi

          SCHEME=$(xcodebuild -list -workspace "$WORKSPACE" | awk '/Schemes:/{flag=1;next}/^$/{flag=0}flag{gsub(/^ +| +$/,""); if(length($0)>0){print; exit}}')
          if [[ -z "$SCHEME" ]]; then
            echo "ERROR: Could not detect a scheme in $WORKSPACE"
            exit 1
          fi
          echo "Using workspace: $WORKSPACE"
          echo "Using scheme: $SCHEME"

          # 2. Archive release app shell (unsigned)
          xcodebuild archive \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath build/ios/export.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGNING_METHOD=manual

          # 3. Inject JS bundle into archived .app
          APP_DIR=$(find build/ios/export.xcarchive -name "*.app" | head -n 1)
          if [[ -z "$APP_DIR" ]]; then
            echo "ERROR: Archive missing .app; check xcodebuild output above."
            exit 1
          fi
          cp ios/main.jsbundle "$APP_DIR/main.jsbundle"
          echo "SUCCESS: Release bundle injected into: $APP_DIR"

          # 4. Zip archive so Codemagic always picks up a file artifact
          ditto -c -k --sequesterRsrc --keepParent build/ios/export.xcarchive build/ios/export.xcarchive.zip
      - name: Export IPA (signed if EXPORT_OPTIONS_PLIST is provided, always emits unsigned)
        script: |
          set -euo pipefail

          ARCHIVE_PATH="build/ios/export.xcarchive"
          APP_DIR=$(find "$ARCHIVE_PATH" -name "*.app" | head -n 1)
          IPA_ROOT="build/ios"

          echo "App bundle: $APP_DIR"

          # Optional signed export when an export options plist is provided (e.g. AdHoc/AppStore)
          if [[ -n "${EXPORT_OPTIONS_PLIST:-}" ]]; then
            echo "Attempting signed export using: $EXPORT_OPTIONS_PLIST"
            xcodebuild -exportArchive \
              -archivePath "$ARCHIVE_PATH" \
              -exportPath "$IPA_ROOT/export-signed" \
              -exportOptionsPlist "$EXPORT_OPTIONS_PLIST"

            SIGNED_IPA=$(find "$IPA_ROOT/export-signed" -name "*.ipa" | head -n 1 || true)
            if [[ -n "$SIGNED_IPA" ]]; then
              mv "$SIGNED_IPA" "$IPA_ROOT/app-signed.ipa"
              echo "Signed IPA: $IPA_ROOT/app-signed.ipa"
            else
              echo "Signed export did not produce an IPA; continuing with unsigned packaging."
            fi
          else
            echo "EXPORT_OPTIONS_PLIST not set; skipping signed export."
          fi

          # Always build an unsigned IPA by packaging the .app payload
          UNSIGNED_DIR="$IPA_ROOT/unsigned"
          mkdir -p "$UNSIGNED_DIR/Payload"
          cp -R "$APP_DIR" "$UNSIGNED_DIR/Payload/"
          (cd "$UNSIGNED_DIR" && zip -r ../app-unsigned.ipa Payload)
          echo "Unsigned IPA: $IPA_ROOT/app-unsigned.ipa"
    artifacts:
      - build/ios/export.xcarchive.zip
      - build/ios/export.xcarchive/**
      - build/ios/app-unsigned.ipa
      - build/ios/app-signed.ipa
